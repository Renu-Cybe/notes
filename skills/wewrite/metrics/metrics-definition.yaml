# wewrite 度量指标定义
# 定义每次执行时需要收集的数据字段

execution:
  # 基础信息
  - id: execution_id          # 执行唯一ID (UUID)
  - id: timestamp             # 执行开始时间 (ISO8601)
  - id: date                   # 日期 (YYYY-MM-DD)
  - id: week                   # 周数 (YYYY-WW)
  - id: month                  # 月份 (YYYY-MM)

  # 输入信息
  - id: trigger_type          # 触发方式: manual(手动) | auto(自动) | scheduled(定时)
  - id: user_query            # 用户原始指令
  - id: topic_source          # 选题来源: user_specified | hot_topics | builder_linkage

  # 效率指标
  - id: total_duration_min    # 总耗时（分钟）
  - id: step_durations        # 各步骤耗时
      - topic_selection       # 选题阶段
      - outline_generation    # 框架生成
      - content_writing       # 内容写作
      - seo_optimization      # SEO优化
      - image_generation      # 封面生成
      - conversion            # 排版转换
      - publishing            # 发布推送

  # 质量指标
  - id: word_count            # 文章字数
  - id: modification_rounds   # 修改轮次（用户编辑次数）
  - id: pass_on_first_try     # 是否一次通过 (true/false)
  - id: ai_trace_score        # 去AI痕迹评分 (0-100)
  - id: compliance_errors      # 合规错误数

  # 结果指标
  - id: output_file           # 输出文件路径
  - id: published            # 是否成功发布 (true/false)
  - id: media_id             # 微信 media_id（如果发布）
  - id: error_message         # 错误信息（如果失败）

  # 复盘指标（发布后补充）
  - id: post_publish_metrics  # 发布后数据
      - read_count            # 阅读量
      - like_count            # 点赞数
      - share_count           # 分享数
      - favorite_count        # 收藏数
      - new_followers         # 新增关注
      - collected_at          # 数据收集时间

# 汇总指标（周/月）
summary:
  weekly:
    - executions_count         # 执行次数
    - success_rate             # 成功率
    - avg_duration             # 平均耗时
    - avg_word_count           # 平均字数
    - first_pass_rate          # 一次通过率
    - total_word_output        # 总输出字数

  monthly:
    - all_weekly_metrics       # 包含所有周指标
    - topic_source_distribution # 选题来源分布
    - error_type_distribution   # 错误类型分布
    - improvement_trend         # 改进趋势（与上月对比）
