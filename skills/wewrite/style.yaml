# WeWrite 风格配置
# 公众号：借我一日闲
# 定位：AI 平权者、布道者 — 让想用 AI 帮助自己的人更简单、更好地用 AI

name: "借我一日闲"
industry: "AI/科技"
target_audience: "想用 AI 提升效率的人 — 非技术极客，实用派"

# 内容方向（AI 垂直）
topics:
  - AI工具评测/使用指南
  - AI工作流/效率提升
  - AI行业动态/builder观察
  - AI入门/零基础教程

# 写作风格
tone: "轻松易懂，像朋友聊天，但内容实用有干货"
voice: "第一人称，像一个用过、踩过坑、能帮你省时间的朋友"
word_count: "1500-2500"

# 内容风格（实用/干货为主）
content_style: "干货"

# 写作人格（口语化，降低门槛）
writing_persona: "midnight-friend"

# 黑名单
blacklist:
  words: ["牛逼", "卧槽", "转发这条", "上期我们"]
  topics: ["政治", "宗教", "色情", "赌博"]

# 参考账号
reference_accounts:
  - "36氪"
  - "极客公园"
  - "AI新榜"

# 排版
theme: "professional-clean"

# 封面风格
cover_style: "科技感但友好，暖色调为主，避免冷冰冰"

# 署名
author: "一日闲"

# 联动配置（follow-builders + wewrite）
enable_builder_linkage: true
builder_linkage_mode: "auto"  # 自动触发，AI垂直内容优先用 builder素材